name: gitea

volumes:
  gitea-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Docker/Gitea/data
  gitea-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Docker/Gitea/config
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Docker/Postgres/Data

services:
  server:
    image: docker.gitea.com/gitea:1.25.5-rootless
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
    volumes:
      # - ./data:/var/lib/gitea
      - gitea-data:/var/lib/gitea
      # - ./config:/etc/gitea
      - gitea-config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:2222"
    networks:
      - gitea
    restart: always
    depends_on:
      - db
  db:
    image: docker.io/library/postgres:16.13
    restart: always
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_DB=gitea
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gitea

networks:
  gitea:
    external: false
    driver: bridge
