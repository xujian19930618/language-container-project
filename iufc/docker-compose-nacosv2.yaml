services:
  nacos_v2:
    container_name: nacos_v2
    image: nacos/nacos-server:v2.3.2-slim
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      MYSQL_SERVICE_HOST: mysql3306
      MYSQL_SERVICE_PORT: 3306
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: Nacos@1234
      MYSQL_DATABASE_NUM: 1
      MYSQL_SERVICE_DB_PARAM: allowPublicKeyRetrieval=true&&characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: [ "CMD", "curl" ,"-f", "http://localhost:8848/nacos/v2/core/cluster/node/self/health" ]
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
      mysql3306:
        condition: service_healthy