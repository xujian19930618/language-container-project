services:
  nacos_v3:
    container_name: nacos_v3
    image: nacos/nacos-server:v3.2.1
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_TOKEN: GGlEyWQ8wEVUpPs3XF5NHDEqLDeBRSPDCmAZFvmHtyk=
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      MYSQL_DATABASE_NUM: 1
      MYSQL_SERVICE_DB_PARAM: allowPublicKeyRetrieval=true&&characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
    ports:
      - "8081:8080"
      - "8849:8848"
      - "9849:9848"
    healthcheck:
      test: [ "CMD", "curl" ,"-f", "http://localhost:8848/nacos/v2/core/cluster/node/self/health" ]
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - iufc