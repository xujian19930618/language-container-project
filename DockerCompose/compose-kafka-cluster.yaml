name: kafka
services:
  controller-1:
    image: apache/kafka:4.1.1-rc2
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/controller-1:/var/lib/kafka/data
      - ./config/kafka/controller-1/secrets:/etc/kafka/secrets
      - ./config/kafka/controller-1/config:/mnt/shared/config
    networks:
      - kafka

  controller-2:
    image: apache/kafka:4.1.1-rc2
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/controller-2:/var/lib/kafka/data
      - ./config/kafka/controller-2/secrets:/etc/kafka/secrets
      - ./config/kafka/controller-2/config:/mnt/shared/config
    networks:
      - kafka

  controller-3:
    image: apache/kafka:4.1.1-rc2
    container_name: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/controller-3:/var/lib/kafka/data
      - ./config/kafka/controller-3/secrets:/etc/kafka/secrets
      - ./config/kafka/controller-3/config:/mnt/shared/config
    networks:
      - kafka

  broker-1:
    image: apache/kafka:4.1.1-rc2
    container_name: broker-1
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/broker-1:/var/lib/kafka/data
      - ./config/kafka/broker-1/secrets:/etc/kafka/secrets
      - ./config/kafka/broker-1/config:/mnt/shared/config
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka

  broker-2:
    image: apache/kafka:4.1.1-rc2
    container_name: broker-2
    ports:
      - 9093:9092
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/broker-2:/var/lib/kafka/data
      - ./config/kafka/broker-2/secrets:/etc/kafka/secrets
      - ./config/kafka/broker-2/config:/mnt/shared/config
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka

  broker-3:
    image: apache/kafka:4.1.1-rc2
    container_name: broker-3
    ports:
      - 9094:9092
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:19092,PLAINTEXT_HOST://localhost:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka/broker-3:/var/lib/kafka/data
      - ./config/kafka/broker-3/secrets:/etc/kafka/secrets
      - ./config/kafka/broker-3/config:/mnt/shared/config
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka

  kafka-ui:
    container_name: kafka-ui
    image: kafbat/kafka-ui:main
    ports:
      - 8088:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    volumes:
      - ./config/kafkaui/config.yml:/etc/kafkaui/dynamic_config.yaml
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    networks:
      - kafka
networks:
  kafka:
    driver: bridge