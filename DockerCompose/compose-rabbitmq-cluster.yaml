name: rabbitmq
services:
  rabbitmq1:
    image: rabbitmq:3.11-management
    container_name: rabbitmq1
    hostname: rabbitmq1
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbit1-data:/var/lib/rabbitmq
    networks:
      - rabbitmq

  rabbitmq2:
    image: rabbitmq:3.11-management
    container_name: rabbitmq2
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5673:5672"
      - "15673:15672"
    depends_on:
      - rabbitmq1
    volumes:
      - rabbit2-data:/var/lib/rabbitmq
    networks:
      - rabbitmq
    command: >
      sh -c "rabbitmq-server &
             sleep 10 &&
             rabbitmqctl stop_app &&
             rabbitmqctl join_cluster rabbit@rabbitmq1 &&
             rabbitmqctl start_app"

  rabbitmq3:
    image: rabbitmq:3.11-management
    container_name: rabbitmq3
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5674:5672"
      - "15674:15672"
    depends_on:
      - rabbitmq1
    volumes:
      - rabbit3-data:/var/lib/rabbitmq
    networks:
      - rabbitmq
    command: >
      sh -c "rabbitmq-server &
             sleep 10 &&
             rabbitmqctl stop_app &&
             rabbitmqctl join_cluster rabbit@rabbitmq1 &&
             rabbitmqctl start_app"

networks:
  rabbitmq:
    driver: bridge
