name: rabbitmq
services:
  rabbitmq1:
    image: rabbitmq:4.2.2-management-alpine
    container_name: rabbitmq1
    hostname: rabbitmq1
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
      RABBITMQ_NODENAME: rabbit@rabbitmq1  # rabbit2 -> rabbit@rabbitmq2, rabbit3 -> rabbit@rabbitmq3
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq/rabbitmq1-data:/var/lib/rabbitmq
    networks:
      - rabbitmq

  rabbitmq2:
    image: rabbitmq:4.2.2-management-alpine
    container_name: rabbitmq2
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
      RABBITMQ_NODENAME: rabbit@rabbitmq12  # rabbit2 -> rabbit@rabbitmq2, rabbit3 -> rabbit@rabbitmq3
    ports:
      - "5673:5672"
      - "15673:15672"
    depends_on:
      - rabbitmq1
    volumes:
      - ./data/rabbitmq/rabbitmq2-data:/var/lib/rabbitmq
    networks:
      - rabbitmq
    command: >
      bash -c "
      rabbitmq-server -detached &&
      sleep 15 &&
      rabbitmqctl stop_app &&
      rabbitmqctl join_cluster rabbit@rabbitmq1 &&
      rabbitmqctl start_app &&
      rabbitmq-server
      "
#rabbitmq-server -detached &&
  #             sleep 15 &&
  rabbitmq3:
    image: rabbitmq:4.2.2-management-alpine
    container_name: rabbitmq3
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: secretcookie
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5674:5672"
      - "15674:15672"
    depends_on:
      - rabbitmq1
    volumes:
      - ./data/rabbitmq/rabbitmq3-data:/var/lib/rabbitmq
    networks:
      - rabbitmq
    command: >
      bash -c "
      rabbitmq-server -detached &&
      sleep 15 &&
      rabbitmqctl stop_app &&
      rabbitmqctl join_cluster rabbit@rabbitmq1 &&
      rabbitmqctl start_app &&
      rabbitmq-server
      "
#rabbitmq-server -detached &&
#             sleep 15 &&
networks:
  rabbitmq:
    driver: bridge
