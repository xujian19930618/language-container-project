name: pgsql
services:
  postgres:
    image: postgres:latest
    #    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    networks:
      pgsql:

networks:
  pgsql:
    driver: bridge


