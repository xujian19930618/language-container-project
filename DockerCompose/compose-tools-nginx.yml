name: nginx
services:
  nginx:
    container_name: nginx
    image: nginx:stable-perl
    volumes:
      - ./config/nginx/conf.d:/etc/nginx/conf.d
      - ./config/nginx/html:/usr/share/nginx/html
    #    restart: always
#    expose:
#      - "30080:80"
    ports:
      - "30080:80"
      - "30443:443"
    deploy:
      replicas: 1
    networks:
      - nginx
  openjdk:
    container_name: openjdk
    image: openjdk:25-rc-jdk
    volumes:
      - ./config/openjdk:/opt/openjdk
    command:
      - java
      - -jar
      - /opt/openjdk/demo-0.0.1-SNAPSHOT.jar
    ports:
      - "8081:8080"
    networks:
      - nginx
networks:
  nginx:
    driver: bridge
