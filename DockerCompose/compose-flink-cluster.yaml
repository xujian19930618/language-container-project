name: flink
services:
  jobmanager:
    image: apache/flink:2.2-scala_2.12-java21
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager        
    networks:
      - flink
  taskmanager:
    image: apache/flink:2.2-scala_2.12-java21
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 2
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - flink
  sql-client:
    image: apache/flink:2.2-scala_2.12-java21
    command: bin/sql-client.sh
    depends_on:
      - jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
    networks:
      - flink
networks:
  flink:
    driver: bridge