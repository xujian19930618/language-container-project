name: replica
version: '3.8'
services:
  redis-master:
    container_name: redis-master
    image: redis:7.2.5
    ports:
      - "6391:6379"
    networks:
      - replica
  redis-slave1:
    container_name: redis-slave
    image: redis:7.2.5
    ports:
      - "6392:6379"
    networks:
      - replica
networks:
  replica:
    driver: bridge