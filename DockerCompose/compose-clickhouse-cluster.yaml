version: "3.8"

networks:
  ck-net:
    driver: bridge

volumes:
  ch1_data:
  ch2_data:
  ch3_data:
  keeper1_data:
  keeper2_data:
  keeper3_data:

services:

  # =========================
  # 🧠 Keeper Cluster
  # =========================

  keeper1:
    image: clickhouse/clickhouse-keeper:25.1
    container_name: keeper1
    hostname: keeper1
    networks: [ck-net]
    ports:
      - "9181:9181"
    volumes:
      - keeper1_data:/var/lib/clickhouse-keeper
      - ./keeper/config.xml:/etc/clickhouse-keeper/keeper_config.xml

  keeper2:
    image: clickhouse/clickhouse-keeper:25.1
    container_name: keeper2
    hostname: keeper2
    networks: [ck-net]
    ports:
      - "9182:9181"
    volumes:
      - keeper2_data:/var/lib/clickhouse-keeper
      - ./keeper/config.xml:/etc/clickhouse-keeper/keeper_config.xml

  keeper3:
    image: clickhouse/clickhouse-keeper:25.1
    container_name: keeper3
    hostname: keeper3
    networks: [ck-net]
    ports:
      - "9183:9181"
    volumes:
      - keeper3_data:/var/lib/clickhouse-keeper
      - ./keeper/config.xml:/etc/clickhouse-keeper/keeper_config.xml


  # =========================
  # ⚙️ ClickHouse Cluster
  # =========================

  clickhouse1:
    image: clickhouse/clickhouse-server:25.1
    container_name: clickhouse1
    hostname: clickhouse1
    networks: [ck-net]
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch1_data:/var/lib/clickhouse
      - ./ch/config.xml:/etc/clickhouse-server/config.xml
      - ./ch/users.xml:/etc/clickhouse-server/users.xml

  clickhouse2:
    image: clickhouse/clickhouse-server:25.1
    container_name: clickhouse2
    hostname: clickhouse2
    networks: [ck-net]
    ports:
      - "8124:8123"
      - "9001:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch2_data:/var/lib/clickhouse
      - ./ch/config.xml:/etc/clickhouse-server/config.xml
      - ./ch/users.xml:/etc/clickhouse-server/users.xml

  clickhouse3:
    image: clickhouse/clickhouse-server:25.1
    container_name: clickhouse3
    hostname: clickhouse3
    networks: [ck-net]
    ports:
      - "8125:8123"
      - "9002:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch3_data:/var/lib/clickhouse
      - ./ch/config.xml:/etc/clickhouse-server/config.xml
      - ./ch/users.xml:/etc/clickhouse-server/users.xml


  # =========================
  # 🌐 UI
  # =========================

  clickhouse-ui:
    image: spoonest/clickhouse-tabix-web-client:latest
    container_name: clickhouse-ui
    networks: [ck-net]
    ports:
      - "8080:80"
    environment:
      CH_HOST: clickhouse1
      CH_PORT: 8123
    depends_on:
      - clickhouse1