version: '3.8'
services:
  # MySQL
  mysql-master:
    image: mysql:8.4.1
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql/master/data:/var/lib/mysql
      - ./data/mysql/master/log:/var/log/mysql
      - ./master/conf.d:/etc/mysql/conf.d
    networks:
      - MySQL
  # MySQL
  mysql-slave1:
    image: mysql:8.4.1
    container_name: mysql-slave1
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql/slave1/data:/var/lib/mysql
      - ./data/mysql/slave1/log:/var/log/mysql
      - ./slave1/conf.d:/etc/mysql/conf.d
    networks:
      - MySQL
  # MySQL
  mysql-slave2:
    image: mysql:8.4.1
    container_name: mysql-slave2
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - "3308:3306"
    volumes:
      - ./data/mysql/slave2/data:/var/lib/mysql
      - ./data/mysql/slave2/log:/var/log/mysql
      - ./slave2/conf.d:/etc/mysql/conf.d
    networks:
      - MySQL
networks:
  MySQL:
